name: Gradle Package

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file

      - name: Build artifacts with Gradle
        run: chmod +x gradlew && ./gradlew clean assemble --no-daemon

      - name: Upload build artifacts api
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: build/libs/packetevents-api-*.jar

      - name: Upload build artifacts netty-common
        uses: actions/upload-artifact@v4
        with:
          name: netty-common-build
          path: build/libs/packetevents-netty-common-*.jar

      - name: Upload build artifacts fabric-common
        uses: actions/upload-artifact@v4
        with:
          name: fabric-common-build
          path: build/libs/packetevents-fabric-common-*.jar

      - name: Upload build artifacts fabric
        uses: actions/upload-artifact@v4
        with:
          name: fabric-build
          path: build/libs/packetevents-fabric-[0-9]*.jar

      - name: Upload build artifacts fabric-official
        uses: actions/upload-artifact@v4
        with:
          name: fabric-official-build
          path: build/libs/packetevents-fabric-official-*.jar

      - name: Publish with Gradle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew publish --no-daemon
        env:
          MAVEN_SNAPSHOT_URL: ${{ secrets.MAVEN_SNAPSHOT_URL }}
          MAVEN_RELEASE_URL:  ${{ secrets.MAVEN_RELEASE_URL }}
          MAVEN_USERNAME:     ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD:     ${{ secrets.MAVEN_PASSWORD }}