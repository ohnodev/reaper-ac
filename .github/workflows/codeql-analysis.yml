name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL Analysis (Java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap PacketEvents 26.2 to Maven local
        run: |
          PACKETEVENTS_REF=74c87ab54565eb714f5d3289ead7909fc3c991b2
          git clone --depth 1 https://github.com/ohnodev/packetevents.git /tmp/packetevents-26.2
          cd /tmp/packetevents-26.2
          git fetch --depth 1 origin "$PACKETEVENTS_REF"
          git checkout --detach "$PACKETEVENTS_REF"
          ./gradlew publishToMavenLocal -x test -x check

      - name: Build for CodeQL
        run: ./gradlew clean build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
