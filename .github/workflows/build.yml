name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 200

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap Fabric API 26.2 to Maven local
        run: |
          git clone --depth 1 --branch 26.2 https://github.com/FabricMC/fabric.git /tmp/fabric-api-26.2
          cd /tmp/fabric-api-26.2
          ./gradlew publishToMavenLocal \
            -x test \
            -x checkstyleMain \
            -x checkstyleTest \
            -x spotlessCheck

      - name: Bootstrap PacketEvents 26.2 to Maven local
        run: |
          git clone --depth 1 --branch 26.2 https://github.com/ohnodev/packetevents.git /tmp/packetevents-26.2
          cd /tmp/packetevents-26.2
          ./gradlew publishToMavenLocal -x test -x check

      - name: Build
        run: ./gradlew build

      - name: Upload Fabric Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: reaperac-fabric
          path: fabric/build/libs/reaperac-fabric-*.jar
          if-no-files-found: error
