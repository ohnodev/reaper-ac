name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL Analysis (Java)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Checkout PacketEvents 26.2 bootstrap ref
        uses: actions/checkout@v4
        with:
          repository: ohnodev/packetevents
          ref: 2b5414d9a88c3c0f580a988b184d5b728030183b
          path: packetevents-26.2
          fetch-depth: 1

      - name: Bootstrap PacketEvents 26.2 to Maven local
        run: |
          cd packetevents-26.2
          ./gradlew publishToMavenLocal -x test -x check

      - name: Build for CodeQL
        run: ./gradlew clean :fabric:build -x test -x check

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
