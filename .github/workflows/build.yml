name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Gradle Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap PacketEvents 26.2 to Maven local
        run: |
          PACKETEVENTS_REF=67056a4d6d0a085d11e229c347306370aa7ea1b8
          git clone --depth 1 https://github.com/ohnodev/packetevents.git /tmp/packetevents-26.2
          cd /tmp/packetevents-26.2
          git fetch --depth 1 origin "$PACKETEVENTS_REF"
          git checkout --detach "$PACKETEVENTS_REF"
          ./gradlew publishToMavenLocal -x test -x check

      - name: Build
        run: ./gradlew build

      - name: Resolve Fabric artifact path
        id: artifact
        run: |
          shopt -s nullglob
          files=(fabric/build/libs/reaperac-fabric-*.jar)
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one reaperac-fabric jar, found ${#files[@]}"
            printf '%s\n' "${files[@]}"
            exit 1
          fi
          echo "jar_path=${files[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload Fabric Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: reaperac-fabric
          path: ${{ steps.artifact.outputs.jar_path }}
          if-no-files-found: error
